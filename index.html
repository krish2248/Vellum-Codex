<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vellum Codex</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Loading Animation -->
  <div id="loader" class="loader">
    <div class="book-flip-container">
      <div class="book-flip">
        <div class="book-flip-cover">
          <span class="book-flip-title">Vellum</span>
          <span class="book-flip-subtitle">Codex</span>
        </div>
        <div class="pages-container">
          <div class="flipping-page"></div>
          <div class="flipping-page"></div>
          <div class="flipping-page"></div>
          <div class="flipping-page"></div>
          <div class="flipping-page"></div>
        </div>
        <div class="book-flip-back"></div>
        <div class="book-flip-spine"></div>
      </div>
    </div>
    <div class="loader-text">Opening the library<span class="loader-dots"></span></div>
  </div>

  <header>
    <div class="header-left">
      <input type="text" id="searchBar" placeholder="Search books..." />
      <select id="sortBy">
        <option value="">Sort By</option>
        <option value="read">Read</option>
        <option value="unread">Unread</option>
        <option value="author">Author</option>
      </select>
    </div>
    <h1>My Book Collection</h1>
    <button id="toggleTheme">Toggle Theme</button>
  </header>

  <main>
    <!-- Stats Dashboard -->
    <section id="statsContainer" class="stats-dashboard"></section>
    
    <!-- Genre Filter Tabs -->
    <section id="genreTabs" class="genre-tabs">
      <button class="genre-tab active" onclick="filterByGenre('')">All</button>
    </section>
    
    <!-- Recommendation Search -->
    <section class="rec-search-container">
      <input type="text" id="recSearchInput" placeholder="Enter a book name to get recommendations..." />
      <button id="recSearchBtn" onclick="searchRecommendations()">Search</button>
      <div id="recResults"></div>
    </section>
    
    <!-- Books Grid -->
    <section class="books" id="bookGrid"></section>
  </main>

  <footer>
    <div class="social-links">
      <a href="https://www.instagram.com/notkrish03/" target="_blank">Instagram</a>
      <a href="https://github.com/krish2248" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/krish-soni-460932228/" target="_blank">LinkedIn</a>
      <a href="https://medium.com/@sonikrish2248" target="_blank">Medium</a>   
      <a href="https://sonikrish.com" target="_blank">Portfolio</a>
    </div>
   
  </footer>

  <script src="books.js"></script>
  <script>
  // Simple inline script
  document.addEventListener('DOMContentLoaded', function() {
    var grid = document.getElementById('bookGrid');
    if (!grid) { alert('No grid!'); return; }
    alert('Rendering ' + books.length + ' books');
    books.forEach(function(b) {
      var c = document.createElement('div');
      c.className = 'book-card';
      c.innerHTML = '<img src="' + b.image + '"/><h3>' + b.title + '</h3>';
      grid.appendChild(c);
    });
    
    var loader = document.getElementById('loader');
    if (loader) loader.classList.add('hidden');
  });
  </script>
</body>
</html>
